<footer class="site-footer" data-pagefind-ignore>
  <div class="wrap site-footer-inner">
    <p>&copy; {{ now.Year }} {{ .Site.Title }}. Contributions from every member, tracked in the open.</p>
    <p class="site-footer-links">
      {{ with .Site.Params.github }}<a href="{{ . }}">Source on GitHub</a>{{ end }}
      <a href="{{ "/about" | relLangURL }}">About</a>
      <a href="{{ "/search" | relLangURL }}">Search</a>
    </p>
  </div>
</footer>
