{{- /* Renders the "date · by author(s)" meta line for a content page.
     Usage: {{ partial "meta.html" . }} where `.` is the Page. */ -}}
<p class="meta">
  <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format (site.Params.dateFormat | default "02 Jan 2006") }}</time>
  {{- with .Params.authors }}
    <span class="meta-sep">&middot;</span> by {{ partial "authors.html" (dict "authors" .) }}
  {{- end }}
</p>
