{{ define "main" }}
<div class="prose page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}{{ . }}{{ end }}
</div>
<div class="wide">
  {{ if .Pages }}
    <ul class="entry-list">
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a class="entry-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
          {{ partial "meta.html" . }}
        </li>
      {{ end }}
    </ul>
  {{ else }}
    <p class="empty-state">No meeting notes logged yet.</p>
  {{ end }}
</div>
{{ end }}
