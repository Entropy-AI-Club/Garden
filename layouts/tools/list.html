{{ define "main" }}
<div class="prose page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}{{ . }}{{ end }}
</div>
<div class="wide">
  {{ if .Pages }}
    <div class="card-grid">
      {{ range .Pages.ByDate.Reverse }}
        <a class="card" href="{{ .RelPermalink }}">
          <h3>{{ .Title }}</h3>
          {{ with .Summary }}<p>{{ . | plainify }}</p>{{ end }}
          {{ partial "meta.html" . }}
        </a>
      {{ end }}
    </div>
  {{ else }}
    <p class="empty-state">No tools added yet.</p>
  {{ end }}
</div>
{{ end }}
